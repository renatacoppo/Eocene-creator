# Strait Corrections Configuration
# 
# Organized by target_grid + remap_method combination.
# Each entry specifies which regions to open (set to local average depth)
# and which regions to close (set to land/0).
#
# IMPORTANT: Grid indices are specific to the grid+remap combination.
# If you change either the target grid or remapping method, you MUST
# verify/recompute these indices or add new entries for the new combination.

PALEORCA2_remapnn:
  # Target grid: PALEORCA2, source: eORCA1, remap: nearest-neighbor
  # Open regions: set cells to local average depth (3x3 neighborhood)
  # Close regions: set cells to 0 (land)
  open_regions:
    - region: Gibraltair
      cells: [[129, 132]]
    - region: RedSea
      cells: [[117, 154], [117, 153]]
    - region: Italy
      cells: [[133, 140], [130, 139]]
    - region: Bering
      cells: [[151, 47]]
    - region: Arctic
      cells: [[166, 60], [173, 143], [173, 144]]
    - region: Baltic
      cells: [[143, 138], [144, 139]]
    - region: Japan
      cells: [[129, 16]]
    - region: Indonesia
      cells: [[115, 12], [101, 11], [102, 11], [105, 15], [106, 15],
               [94, 16], [86, 15], [81, 41], [96, 7]]
    - region: Spain
      cells: [[134, 128]]
    - region: Madagascar
      cells: [[81, 154]]
  
  close_regions:
